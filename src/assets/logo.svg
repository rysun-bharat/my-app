  <!-- Rocket nose tip -->
  <ellipse cx="50" cy="19" rx="5" ry="6" fill="#90CAF9"/>

  <!-- Rocket window -->
  <circle cx="50" cy="41" r="5" fill="#1565C0"/>
  <circle cx="50" cy="41" r="3.5" fill="#42A5F5"/>

  <!-- Rocket body lower -->
  <rect x="38" y="50" width="24" height="14" rx="3" fill="white" opacity="0.9"/>

  <!-- Left fin -->
  <path d="M38 52 L28 64 L38 62 Z" fill="white" opacity="0.85"/>

  <!-- Right fin -->
  <path d="M62 52 L72 64 L62 62 Z" fill="white" opacity="0.85"/>

  <!-- Flame outer -->
  <ellipse cx="50" cy="70" rx="9" ry="12" fill="#FF7043" opacity="0.9"/>
  <!-- Flame inner -->
  <ellipse cx="50" cy="70" rx="5" ry="8" fill="#FFCC02"/>
</svg>
